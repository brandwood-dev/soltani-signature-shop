name: Critical Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-critical:
    name: Frontend critical checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Secret exposure guard
        shell: bash
        run: |
          set -euo pipefail
          SECRET_PATTERN='(gh[pousr]_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|SUPABASE_[A-Z0-9_]*(SERVICE|ROLE|KEY)[A-Z0-9_]*[[:space:]]*=[[:space:]]*["'\'']?eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+|service_role[^[:space:]]*eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+|JWT(_[A-Z0-9]+)*_SECRET[[:space:]]*=[[:space:]]*["'\'']?[A-Za-z0-9_./+=-]{16,}|BREVO_API_KEY[[:space:]]*=[[:space:]]*["'\'']?(xkeysib-[A-Za-z0-9._-]{20,}|[A-Za-z0-9_-]{32,})|(DATABASE_URL|DIRECT_URL)[[:space:]]*=[[:space:]]*["'\'']?(postgres(ql)?|mysql|mongodb)://[^:/"'\'']+:[^@/"'\'']+@)'
          ! git grep -InE "$SECRET_PATTERN" -- \
            . \
            ':(exclude).env.example' \
            ':(exclude).env.sample' \
            ':(exclude)README.md' \
            ':(exclude)docs/**' \
            ':(exclude)bun.lock'

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build frontend
        run: bun run build

      - name: Production smoke tests
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          home_status="$(curl -sS -o /tmp/home.html -w "%{http_code}" "https://www.soltanisignature.com/")"
          test "$home_status" = "200"
          grep -qi "Soltani" /tmp/home.html

          promotions_status="$(curl -sS -o /tmp/promotions.html -w "%{http_code}" "https://www.soltanisignature.com/promotions")"
          test "$promotions_status" = "200"
          ! grep -q "selectedPriceRange is not defined" /tmp/promotions.html
          ! grep -q "Something went wrong on our end" /tmp/promotions.html
